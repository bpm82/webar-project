name: Generate QR Codes for Assets

on:
  push:
    paths:
      - 'assets/**'
  workflow_dispatch:

jobs:
  generate-qr:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install qrcode

      - name: Generate QR codes
        run: node scripts/generate-qr.js

      - name: Commit generated QR codes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/**/qrcode.svg
          if git diff --cached --quiet; then
            echo "No new QR codes to commit."
          else
            git commit -m "chore: auto-generate QR codes for assets"
            git push
          fi

      - name: Validate assets
        run: node scripts/validate-assets.js
