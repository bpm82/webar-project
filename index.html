<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebAR Project</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
  
  <script>
    // URLからパラメータを取得してパスを作る
    const urlParams = new URLSearchParams(window.location.search);
    
    // ↓ここを 'wineglass' から 'test' に戻しました！
    const targetId = urlParams.get('id') || urlParams.get('model') || 'test';
    
    const modelPath = `./assets/${targetId}/model.glb`;
    const markerPath = `./assets/${targetId}/pattern.patt`;

    console.log(`Loading Model: ${modelPath}`);
    console.log(`Loading Marker: ${markerPath}`);
  </script>

  <a-scene id="ar-scene" embedded arjs="debugUIEnabled: false;">
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // A-Frameの初期化完了を待つ
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const sceneEl = document.getElementById('ar-scene');

        // マーカー要素を生成
        const markerEl = document.createElement('a-marker');
        markerEl.setAttribute('type', 'pattern');
        markerEl.setAttribute('url', markerPath); 
        markerEl.setAttribute('emitevents', 'true');

        // モデル要素を生成
        const modelEl = document.createElement('a-entity');
        modelEl.setAttribute('gltf-model', modelPath); 
        modelEl.setAttribute('scale', '1 1 1');
        modelEl.setAttribute('position', '0 0 0');
        modelEl.setAttribute('rotation', '-90 0 0');

        // マーカーの中にモデルを入れ、シーンの中にマーカーを入れる
        markerEl.appendChild(modelEl);
        sceneEl.appendChild(markerEl);

        console.log('Marker and model added to scene');
      }, 500); // 0.5秒待つ
    });
  </script>
</body>
</html>
