<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <title>花ARテスト</title>
  <script>
    const params = new URLSearchParams(window.location.search);
    const model = params.get('model') || 'flower';
    window.modelPath = `./models/${model}.glb`;
    window.markerPath = `./markers/pattern-${model}.patt`;
  </script>
</head>
<body style="margin: 0; overflow: hidden">
  <a-scene embedded arjs vr-mode-ui="enabled: false;" renderer="logarithmicDepthBuffer: true;">

    <a-assets>
      <a-asset-item id="model" src=""></a-asset-item>
    </a-assets>

    <a-marker type="pattern" url="">
      <a-entity gltf-model="#model"></a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    document.querySelector('a-asset-item').setAttribute('src', window.modelPath);
    document.querySelector('a-marker').setAttribute('url', window.markerPath);
  </script>
</body>
</html>
